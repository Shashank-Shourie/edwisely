version: '3.8'

services:
	backend:
		build:
			context: ./backend
			dockerfile: Dockerfile
		volumes:
			- ./backend/app:/app/app:rw
			- ./backend/requirements.txt:/app/requirements.txt:ro
		ports:
			- "8000:8000"
		environment:
			- TZ=UTC
		depends_on: []

	frontend:
		build:
			context: ./frontend
			dockerfile: Dockerfile
		volumes:
			- ./frontend:/usr/src/app:rw
		ports:
			- "3000:3000"
		environment:
			- CHOKIDAR_USEPOLLING=true
		command: ["/bin/sh","-c","npm run dev -- --hostname 0.0.0.0"]

